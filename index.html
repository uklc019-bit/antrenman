<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5. Ay Programı</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b0b;
  color:#eee;
}

/* SEKME BAR */
.tabs{
  display:flex;
  justify-content:space-around;
  background:rgba(20,20,20,0.9);
  padding:12px;
  box-shadow:0 0 15px rgba(255,0,0,0.2);
  position:sticky;
  top:0;
}

/* SEKME */
.tab{
  padding:10px 14px;
  cursor:pointer;
  border-radius:12px;
  transition:0.3s;
  color:#bbb;
}

.tab:hover{
  background:rgba(255,0,0,0.15);
  color:#fff;
}

/* AKTİF SEKME */
.active{
  background:linear-gradient(135deg,#ff1a1a,#b30000);
  color:white;
  box-shadow:0 0 12px rgba(255,0,0,0.6);
}

/* GÜNLER */
.day{
  display:none;
}

.day.active{
  display:block;
}

/* KART */
.card{
  background:rgba(25,25,25,0.9);
  margin:15px;
  padding:15px;
  border-radius:18px;
  box-shadow:0 0 20px rgba(255,0,0,0.15);
  transition:0.3s;
}

.card:hover{
  box-shadow:0 0 25px rgba(255,0,0,0.35);
  transform:scale(1.01);
}

/* GIF */
.card img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
  opacity:0.9;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
  outline:none;
  box-shadow: inset 0 0 5px rgba(255,0,0,0.3);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ff1a1a,#800000);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 10px rgba(255,0,0,0.5);
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(255,0,0,0.8);
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showDay('gogus', this)">Göğüs</div>
  <div class="tab" onclick="showDay('sirt', this)">Sırt</div>
  <div class="tab" onclick="showDay('omuz', this)">Omuz</div>
  <div class="tab" onclick="showDay('kol', this)">Kol</div>
  <div class="tab" onclick="showDay('bacak', this)">Bacak</div>
</div>

<div id="gogus" class="day active"></div>
<div id="sirt" class="day"></div>
<div id="omuz" class="day"></div>
<div id="kol" class="day"></div>
<div id="bacak" class="day"></div>

<script>
function showDay(id, el){
  document.querySelectorAll(".day").forEach(d=>d.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

function createWorkout(day, exercises){
  let container = document.getElementById(day);

  exercises.forEach((ex,i)=>{
    let div = document.createElement("div");
    div.className = "card";

    let html = `<h2>${ex[0]}</h2>
    <img src="ornek.gif">`;

    for(let s=1;s<=ex[1];s++){
      let key = day+"_"+i+"_"+s;
      let val = localStorage.getItem(key) || "";
      html += `<input placeholder="Set ${s}" value="${val}" onchange="save('${key}', this.value)">`;
    }

    html += `<button onclick="alert('Kaydedildi')">Kaydet</button>`;

    div.innerHTML = html;
    container.appendChild(div);
  });
}

function save(key, val){
  localStorage.setItem(key, val);
}

/* SAYFA YÜKLENDİKTEN SONRA ÇALIŞTIR */
window.onload = function(){

createWorkout("gogus", [
["Incline Bench Press",4],
["Incline Dumbbell Fly",3],
["Bench Press",4],
["Dumbbell Press",3],
["Decline Bench Press",3],
["Cable Crossover",3]
]);

createWorkout("sirt", [
["Lat Pull Down Machine",4],
["T-Bar Row",3],
["Seated Cable Row",4],
["One Arm Dumbbell Row",3],
["Barbell Bent-over Rowing",3],
["Vertical Row Machine",3]
]);

createWorkout("omuz", [
["Military Press",4],
["Front Raise",3],
["Barbell Neck Press",4],
["Lateral Raise",3],
["Dumbbell Shoulder Press",3],
["Reverse Pec Fly",3]
]);

createWorkout("kol", [
["Dar Bench Press",3],
["Barbell Biceps Curl",3],
["Triceps Push Down",3],
["Scott Curl",3],
["French Triceps",3],
["Hammer Curl",3],
["One Dumbbell Triceps Press",3],
["Alternative Curl",3]
]);

createWorkout("bacak", [
["Barbell Squat",4],
["Leg Press Machine",4],
["Leg Extension",3],
["Leg Curl",3],
["Lunge",3],
["Calf Raise",3]
]);

}
</script>

</body>
</html>
