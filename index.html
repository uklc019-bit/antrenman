<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5. Ay Programı</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#fff;
}

header{
  text-align:center;
  padding:16px;
  font-size:22px;
  border-bottom:2px solid #8b1e34;
}

.tabs{
  display:flex;
}

.tabs button{
  flex:1;
  padding:14px;
  background:#111;
  color:#fff;
  border:none;
  font-weight:bold;
}

.tabs button.active{
  background:#1e1e1e;
  border-bottom:3px solid #8b1e34;
}

.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

.day{display:none}

.exercise{
  background:#161616;
  padding:15px;
  border-radius:10px;
  margin-bottom:18px;
}

.exercise h3{
  margin:0 0 10px;
}

.gif{
  width:100%;
  max-height:220px;
  object-fit:contain;
  background:#000;
  border-radius:8px;
  margin-bottom:10px;
}

.kg {
  display:flex;
  gap:5px;
}

.kg input{
  width:40px;
  padding:6px;
  border-radius:6px;
  border:none;
  text-align:center;
}

.kg button{
  background:#8b1e34;
  border:none;
  border-radius:6px;
  padding:6px 12px;
  font-weight:bold;
  color:white;
}
</style>
</head>

<body>

<header>5. Ay Antrenman Programı</header>

<div class="tabs">
  <button class="active" onclick="showDay('g1',this)">Göğüs</button>
  <button onclick="showDay('g2',this)">Sırt</button>
  <button onclick="showDay('g3',this)">Omuz</button>
  <button onclick="showDay('g4',this)">Kol</button>
  <button onclick="showDay('g5',this)">Bacak</button>
</div>

<div class="container">

<!-- GÖĞÜS -->
<div id="g1" class="day" style="display:block">
  <div class="exercise"><h3>Incline Bench Press</h3><img src="GIF_LINK" class="gif"><KgBox id="g1_1" set="4"/></div>
  <div class="exercise"><h3>Incline Dumbbell Fly</h3><img src="GIF_LINK" class="gif"><KgBox id="g1_2" set="3"/></div>
  <div class="exercise"><h3>Bench Press</h3><img src="GIF_LINK" class="gif"><KgBox id="g1_3" set="4"/></div>
</div>

<!-- SIRT -->
<div id="g2" class="day">
  <div class="exercise"><h3>Lat Pull Down</h3><img src="GIF_LINK" class="gif"><KgBox id="g2_1" set="4"/></div>
  <div class="exercise"><h3>T-Bar Row</h3><img src="GIF_LINK" class="gif"><KgBox id="g2_2" set="3"/></div>
</div>

<!-- OMUZ -->
<div id="g3" class="day">
  <div class="exercise"><h3>Military Press</h3><img src="GIF_LINK" class="gif"><KgBox id="g3_1" set="4"/></div>
</div>

<!-- KOL -->
<div id="g4" class="day">
  <div class="exercise"><h3>Barbell Biceps Curl</h3><img src="GIF_LINK" class="gif"><KgBox id="g4_1" set="3"/></div>
</div>

<!-- BACAK -->
<div id="g5" class="day">
  <div class="exercise"><h3>Barbell Squat</h3><img src="GIF_LINK" class="gif"><KgBox id="g5_1" set="4"/></div>
</div>

</div>

<script>
function showDay(id,el){
  document.querySelectorAll('.day').forEach(d=>d.style.display='none');
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).style.display='block';
  el.classList.add('active');
}

function renderKg(){
  document.querySelectorAll("KgBox").forEach(e=>{
    const id = e.getAttribute("id");
    const set = e.getAttribute("set");

    let inputs = '';
    for(let i=0; i<set; i++){
      inputs += `<input id="${id}_${i}" placeholder="Kg" value="${localStorage.getItem(id+'_'+i)||''}">`;
    }

    e.outerHTML = `<div class="kg">
      ${inputs}
      <button onclick="
        for(let j=0;j<${set};j++){
          localStorage.setItem('${id}_'+j,document.getElementById('${id}_'+j).value);
        }
      ">Kaydet</button>
    </div>`;
  });
}

renderKg();
</script>

</body>
</html>
