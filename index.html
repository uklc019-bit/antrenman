<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5. Ay Programı</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0a0a0a;color:#eaeaea;}

/* ÜST SEÇİM ALANI */
.top-select{
  display:flex;
  gap:10px;
  padding:10px;
  background:#111;
}

.top-select select{
  padding:8px;
  border-radius:8px;
  border:none;
}

.top-select button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#8b1e34;
  color:#fff;
  cursor:pointer;
}

.tabs{display:flex;justify-content:space-around;padding:12px;background:rgba(18,18,18,0.95);border-bottom:1px solid rgba(120,20,40,0.3);}
.tab{padding:10px 14px;cursor:pointer;border-radius:12px;color:#aaa;transition:0.3s;}
.tab:hover{color:#fff;background:rgba(120,20,40,0.15);}
.active{background:linear-gradient(135deg,#5a0f1f,#8b1e34);color:#fff;box-shadow:0 0 10px rgba(139,30,52,0.5);}
.day{display:none;}
.day.active{display:block;}
.card{background:rgba(22,22,22,0.95);margin:15px;padding:15px;border-radius:18px;border:1px solid rgba(139,30,52,0.2);box-shadow:0 5px 20px rgba(0,0,0,0.6);}
.card img{width:100%;border-radius:12px;margin-bottom:10px;opacity:0.9;}
input{width:100%;padding:10px;margin:6px 0;border:none;border-radius:10px;background:#111;color:#fff;outline:none;border:1px solid rgba(139,30,52,0.2);}
input:focus{border:1px solid #8b1e34;box-shadow:0 0 5px rgba(139,30,52,0.5);}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:12px;background:linear-gradient(135deg,#5a0f1f,#8b1e34);color:white;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover{background:linear-gradient(135deg,#8b1e34,#b8324d);transform:scale(1.02);}
.count{color:#d4af37;font-weight:bold;margin-left:5px;}
</style>
</head>
<body>

<!-- 🔥 EKLEDİĞİM KISIM -->
<div class="top-select">
  <select id="secim">
    <option value="gogus">Göğüs</option>
    <option value="sirt">Sırt</option>
    <option value="omuz">Omuz</option>
    <option value="kol">Kol</option>
    <option value="bacak">Bacak</option>
  </select>
  <button onclick="kaydetSecim()">Tamamlandı/Kaydet</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="showDay('gogus', this)">Göğüs</div>
  <div class="tab" onclick="showDay('sirt', this)">Sırt</div>
  <div class="tab" onclick="showDay('omuz', this)">Omuz</div>
  <div class="tab" onclick="showDay('kol', this)">Kol</div>
  <div class="tab" onclick="showDay('bacak', this)">Bacak</div>
</div>

<div id="gogus" class="day active"></div>
<div id="sirt" class="day"></div>
<div id="omuz" class="day"></div>
<div id="kol" class="day"></div>
<div id="bacak" class="day"></div>

<script>

// 🔥 SEÇİM KAYDETME
function kaydetSecim(){
  const val = document.getElementById("secim").value;
  localStorage.setItem("secim", val);
}

// SAYFA AÇILINCA GERİ YÜKLE
window.onload=function(){
  const val = localStorage.getItem("secim");
  if(val){
    document.getElementById("secim").value = val;
  }

  // ORİJİNAL KODUN DEVAMI 👇
  createWorkout("gogus",[
    ["Incline Bench Press",4,"https://www.strengthlog.com/wp-content/uploads/2020/03/Incline-Bench-Press.gif"],
    ["Incline Dumbbell Fly",3,"https://training.fit/wp-content/uploads/2020/02/fliegende-schraegbank-800x448.png"],
    ["Bench Press",4,"https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Bench-Press.gif"],
    ["Dumbbell Press",3,"https://burnfit.io/en/wp-content/uploads/sites/3/2026/01/DB_BP.gif"],
    ["Decline Bench Press",3,"https://fitnessprogramer.com/wp-content/uploads/2021/03/Decline-Barbell-Bench-Press.gif"],
    ["Cable Crossover",3,"https://i.pinimg.com/originals/06/bc/08/06bc08f20343ec7179604d52c4e0e054.gif"]
  ]);

  createWorkout("sirt",[
    ["Lat Pull Down Machine",4,"https://fitnessprogramer.com/wp-content/uploads/2021/02/Lat-Pulldown.gif"]
  ]);

  createWorkout("omuz",[
    ["Military Press",4,"https://i0.wp.com/www.strengthlog.com/wp-content/uploads/2020/04/smith-machine-shoulder-press.gif?fit=600%2C600&ssl=1"]
  ]);

  createWorkout("kol",[
    ["Dar Bench Press",3,"https://9to5strength.com/wp-content/uploads/2016/09/Close-Grip-Bench-Press.gif"]
  ]);

  createWorkout("bacak",[
    ["Barbell Squat",4,"https://fitnessprogramer.com/wp-content/uploads/2023/01/Barbell-Jump-Squat.gif"]
  ]);
};

// Sekme geçiş
function showDay(id, el){
  document.querySelectorAll(".day").forEach(d=>d.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  el.classList.add("active");
}

// LocalStorage kaydet
function save(key, val){ localStorage.setItem(key,val); }

// Hareketleri oluşturma
function createWorkout(day, exercises){
  let container=document.getElementById(day);
  exercises.forEach((ex,i)=>{
    let div=document.createElement("div");
    div.className="card";
    let html=`<h3>${ex[0]} <span class="count">${i+1}/${exercises.length}</span></h3>`;
    html+=`<img src="${ex[2] || 'ornek.gif'}">`;
    for(let s=1;s<=ex[1];s++){
      let key=`${day}_${i}_${s}`;
      let val=localStorage.getItem(key)||"";
      html+=`<input placeholder="Set ${s}" value="${val}" onchange="save('${key}',this.value)">`;
    }
    html+=`<button onclick="alert('Kaydedildi')">Kaydet</button>`;
    div.innerHTML=html;
    container.appendChild(div);
  });
}
</script>
</body>
</html>
