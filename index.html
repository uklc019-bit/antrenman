<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5. Ay Programı</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}

.tabs{
  display:flex;
  justify-content:space-around;
  background:#1a1a1a;
  padding:10px;
}

.tab{
  padding:10px;
  cursor:pointer;
  border-radius:10px;
}

.active{
  background:#6c5ce7;
}

.day{
  display:none;
}

.day.active{
  display:block;
}

.card{
  background:#1c1c1c;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.sets input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#6c5ce7;
  border:none;
  border-radius:10px;
  color:white;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showDay('gogus', this)">Göğüs</div>
  <div class="tab" onclick="showDay('sirt', this)">Sırt</div>
  <div class="tab" onclick="showDay('omuz', this)">Omuz</div>
  <div class="tab" onclick="showDay('kol', this)">Kol</div>
  <div class="tab" onclick="showDay('bacak', this)">Bacak</div>
</div>

<!-- GÖĞÜS -->
<div id="gogus" class="day active">
  <script>createWorkout("gogus", [
    ["Incline Bench Press",4],
    ["Incline Dumbbell Fly",3],
    ["Bench Press",4],
    ["Dumbbell Press",3],
    ["Decline Bench Press",3],
    ["Cable Crossover",3]
  ])</script>
</div>

<!-- SIRT -->
<div id="sirt" class="day">
  <script>createWorkout("sirt", [
    ["Lat Pull Down Machine",4],
    ["T-Bar Row",3],
    ["Seated Cable Row",4],
    ["One Arm Dumbbell Row",3],
    ["Barbell Bent-over Rowing",3],
    ["Vertical Row Machine",3]
  ])</script>
</div>

<!-- OMUZ -->
<div id="omuz" class="day">
  <script>createWorkout("omuz", [
    ["Military Press",4],
    ["Front Raise",3],
    ["Barbell Neck Press",4],
    ["Lateral Raise",3],
    ["Dumbbell Shoulder Press",3],
    ["Reverse Pec Fly",3]
  ])</script>
</div>

<!-- KOL -->
<div id="kol" class="day">
  <script>createWorkout("kol", [
    ["Dar Bench Press",3],
    ["Barbell Biceps Curl",3],
    ["Triceps Push Down",3],
    ["Scott Curl",3],
    ["French Triceps",3],
    ["Hammer Curl",3],
    ["One Dumbbell Triceps Press",3],
    ["Alternative Curl",3]
  ])</script>
</div>

<!-- BACAK -->
<div id="bacak" class="day">
  <script>createWorkout("bacak", [
    ["Barbell Squat",4],
    ["Leg Press Machine",4],
    ["Leg Extension",3],
    ["Leg Curl",3],
    ["Lunge",3],
    ["Calf Raise",3]
  ])</script>
</div>

<script>
function showDay(id, el){
  document.querySelectorAll(".day").forEach(d=>d.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

function createWorkout(day, exercises){
  let container = document.getElementById(day);

  exercises.forEach((ex,i)=>{
    let div = document.createElement("div");
    div.className = "card";

    let html = `<h2>${ex[0]}</h2>
    <img src="ornek.gif">`;

    for(let s=1;s<=ex[1];s++){
      let key = day+"_"+i+"_"+s;
      let val = localStorage.getItem(key) || "";
      html += `<input placeholder="Set ${s}" value="${val}" onchange="save('${key}', this.value)">`;
    }

    html += `<button onclick="alert('Kaydedildi')">Kaydet</button>`;

    div.innerHTML = html;
    container.appendChild(div);
  });
}

function save(key, val){
  localStorage.setItem(key, val);
}
</script>

</body>
</html>
